name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Type check
        run: mypy src/qplanck
      - name: Test
        run: pytest --cov

  qiskit-adapter:
    name: Optional Qiskit adapter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,qiskit]"
      - name: Test
        run: pytest tests/test_qiskit_adapter.py

  qir-conformance:
    name: Official PyQIR validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,qir-validation]"
      - name: Verify generated Base Profile LLVM
        run: pytest tests/test_qir.py

  documentation:
    name: Documentation gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install documentation tools
        run: |
          npm install --global \
            markdownlint-cli2@0.23.0 \
            markdown-link-check@3.14.2 \
            @mermaid-js/mermaid-cli@11.16.0
      - name: Markdown lint
        run: markdownlint-cli2 "**/*.md" "#node_modules/**"
      - name: Relative links and research structure
        run: python tools/check_docs.py --extract-mermaid "$RUNNER_TEMP/qcore-mermaid"
      - name: External links
        run: find . -name '*.md' -not -path './.git/*' -not -path './.pytest_cache/*' -print0 | xargs -0 -r -n1 markdown-link-check --config .markdown-link-check.json --quiet
      - name: Mermaid rendering
        run: find "$RUNNER_TEMP/qcore-mermaid" -name '*.mmd' -print0 | xargs -0 -r -n1 mmdc --quiet --input
      - name: Current code examples
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,qiskit]"
          pytest tests/test_cli_examples.py tests/test_qasm3.py tests/test_qiskit_adapter.py
