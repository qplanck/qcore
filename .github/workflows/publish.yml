name: Publish Python distribution

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build and verify distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install verification and build tools
        run: python -m pip install --upgrade ".[dev,qir-validation]" build twine
      - name: Verify source tree
        run: |
          ruff check .
          ruff format --check .
          mypy src/qplanck
          pytest
      - name: Build wheel and source distribution
        run: python -m build
      - name: Check package metadata and description
        run: python -m twine check --strict dist/*
      - name: Smoke-test the built wheel
        run: |
          python -m venv "$RUNNER_TEMP/wheel-test"
          "$RUNNER_TEMP/wheel-test/bin/pip" install dist/*.whl
          "$RUNNER_TEMP/wheel-test/bin/qplanck" doctor
      - name: Upload immutable distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/qplanck
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish with trusted identity
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/qplanck
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish with trusted identity
        uses: pypa/gh-action-pypi-publish@release/v1
